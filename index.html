<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>acuart — Sign in</title>

<style>

  :root {

    --gallery: #e9e4da;

    --card: #fffdf8;

    --ink: #2c2a26;

    --muted: #8a8276;

    --frame-gold: #c79a4b;

    --pine: #3d5a4c;

    --pine-dark: #2e453a;

  }

  * { box-sizing: border-box; }

  body {

    margin: 0;

    min-height: 100vh;

    display: flex;

    align-items: center;

    justify-content: center;

    background: var(--gallery);

    background-image:

      radial-gradient(circle at 15% 20%, rgba(199, 154, 75, 0.08), transparent 40%),

      radial-gradient(circle at 85% 80%, rgba(61, 90, 76, 0.08), transparent 40%);

    font-family: 'Helvetica Neue', Arial, sans-serif;

    color: var(--ink);

    padding: 24px;

  }

  .frame {

    width: 100%;

    max-width: 380px;

    background: var(--card);

    border: 10px solid var(--frame-gold);

    border-radius: 2px;

    box-shadow:

      0 1px 0 rgba(0,0,0,0.05) inset,

      0 18px 40px -16px rgba(44, 42, 38, 0.35);

    padding: 40px 32px 32px;

  }

  .wordmark {

    text-align: center;

    margin-bottom: 28px;

  }

  .wordmark .acu {

    font-family: Georgia, 'Times New Roman', serif;

    font-size: 34px;

    font-weight: 700;

    letter-spacing: 1px;

    color: var(--ink);

  }

  .wordmark .art {

    font-family: Georgia, 'Times New Roman', serif;

    font-style: italic;

    font-size: 34px;

    color: var(--pine);

  }

  .wordmark .tagline {

    margin-top: 6px;

    font-size: 11px;

    letter-spacing: 3px;

    text-transform: uppercase;

    color: var(--muted);

  }

  .divider {

    height: 1px;

    background: linear-gradient(to right, transparent, var(--frame-gold), transparent);

    margin: 0 0 28px;

  }

  form {

    display: flex;

    flex-direction: column;

    gap: 18px;

  }

  label {

    display: block;

    font-size: 11px;

    letter-spacing: 2px;

    text-transform: uppercase;

    color: var(--muted);

    margin-bottom: 6px;

  }

  input[type="text"],

  input[type="password"] {

    width: 100%;

    padding: 12px 14px;

    font-size: 15px;

    border: 1px solid #d8d2c6;

    border-radius: 3px;

    background: #fcfaf6;

    color: var(--ink);

    outline: none;

    transition: border-color 0.2s ease, box-shadow 0.2s ease;

  }

  input[type="text"]:focus,

  input[type="password"]:focus {

    border-color: var(--pine);

    box-shadow: 0 0 0 3px rgba(61, 90, 76, 0.12);

  }

  button {

    margin-top: 8px;

    padding: 13px;

    font-size: 13px;

    letter-spacing: 2px;

    text-transform: uppercase;

    font-weight: 600;

    color: #fdfcf8;

    background: var(--pine);

    border: none;

    border-radius: 3px;

    cursor: pointer;

    transition: background 0.2s ease;

  }

  button:hover {

    background: var(--pine-dark);

  }

  button:focus-visible,

  input:focus-visible {

    outline: 2px solid var(--frame-gold);

    outline-offset: 2px;

  }

  .footnote {

    text-align: center;

    margin-top: 22px;

    font-size: 12px;

    color: var(--muted);

  }

</style>

</head>

<body>

  <div class="frame">

    <div class="wordmark">

      <span class="acu">acu</span><span class="art">art</span>

      <div class="tagline">Gallery &amp; Supplies</div>

    </div>

    <div class="divider"></div>

    <form onsubmit="return false;">

      <div>

        <label for="username">Username</label>

        <input type="text" id="username" name="username" autocomplete="username" required>

      </div>

      <div>

        <label for="password">Password</label>

        <input type="password" id="password" name="password" autocomplete="current-password" required>

      </div>

      <button type="submit">Log in</button>

    </form>

    <div class="footnote">Sign in to manage your acuart account</div>

  </div>

</body>

</html>
